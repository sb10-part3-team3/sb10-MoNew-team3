spring:
  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER_NAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    mongodb:
      uri: ${MONGODB_URI}
  jpa:
    show-sql: false
    properties:
      hibernate:
        ddl-auto: validate
        format_sql: false
  sql:
    init:
      mode: never

logging:
  level:
    com.team3.monew: info
    org.hibernate.SQL: info

cloud:
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET}
    region:
      static: ${AWS_S3_REGION:ap-northeast-2}
    credentials:
      access-key: ${AWS_S3_ACCESS_KEY}
      secret-key: ${AWS_S3_SECRET_KEY}

server:
  port: 80

management:
  metrics:
    export:
      cloudwatch:
        enabled: true
        namespace: ${CLOUDWATCH_NAMESPACE:monew}
        step: 1m
