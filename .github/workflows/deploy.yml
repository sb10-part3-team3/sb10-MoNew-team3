name: Deploy
on:
  push:
    branches: [ "release" ]
    paths-ignore:
      - '**/README.md'
      - '**/*.md'
      - '**/*.mdx'
      - 'docs/**'
      - '**/.env.example'
      - '**/*.example'
      - '.gitignore'

jobs:
  # docker 이미지 빌드 & 푸시
  build-and-push:
    runs-on: ubuntu-latest
    steps:

      - name: 소스코드 가져오기
        uses: actions/checkout@v4

      - name: AWS CLI 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1 # public ECR이기 때문에

      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: 태그 정의
        id: tags
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Docker 이미지 빌드 & 푸시
        env:
          REPO_URI: ${{ vars.ECR_REPOSITORY_URI }}
        run: |
          docker build -t "$REPO_URI:$IMAGE_TAG" -t "$REPO_URI:latest" .
          docker push "$REPO_URI:$IMAGE_TAG"
          docker push "$REPO_URI:latest"

  # ECS 서비스 업데이트
  ecs-update:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: 소스코드 가져오기(작업 정의)
        uses: actions/checkout@v4

      - name: 작업정의 환경 변수 치환
        run: |
          export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          export AWS_S3_ENV_ARN=${{ secrets.AWS_S3_ENV_ARN }}
          export ECR_REPOSITORY_URI=${{ vars.ECR_REPOSITORY_URI }}
          export IMAGE_TAG=${GITHUB_SHA::7}

          envsubst < task-definition.json > task-definition-rendered.json

      - name: AWS CLI 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: 새로운 작업 정의 등록
        run: |
          NEW_TASK_DEFINITION_ARN=$(aws ecs register-task-definition \
           --cli-input-json file://task-definition-rendered.json \
           --query 'taskDefinition.taskDefinitionArn' \
           --output text)
          echo "NEW_TASK_DEFINITION_ARN=$NEW_TASK_DEFINITION_ARN" >> $GITHUB_ENV

      - name: ECS 업데이트
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --service ${{ vars.ECS_SERVICE }} \
            --task-definition ${{ env.NEW_TASK_DEFINITION_ARN }} \
            --force-new-deployment

      - name: ECS 배포 완료 대기
        run: |
          aws ecs wait services-stable \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services ${{ vars.ECS_SERVICE }}
          
          echo "✅ 새로운 배포가 완료되었습니다!"

      - name: ECS 배포 상태 확인
        run: |
          aws ecs describe-services \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services ${{ vars.ECS_SERVICE }} \
            --query "services[0].deployments"