name: Test-Dev

on:
  pull_request:
    branches:
      - dev
    paths-ignore:
      - '**/README.md'
      - '**/*.md'
      - '**/*.mdx'
      - 'docs/**'
      - '**/.env.example'
      - '**/*.example'
      - '.gitignore'
  push: # 브랜치 테스트 추가
    branches:
      - dev
    paths-ignore:
      - '**/README.md'
      - '**/*.md'
      - '**/*.mdx'
      - 'docs/**'
      - '**/.env.example'
      - '**/*.example'
      - '.gitignore'

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      checks: write
      pull-requests: write
      contents: read

    steps:
      - name: 소스코드 가져오기
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: 실행권한 부여
        run: chmod +x gradlew

      - name: 테스트 (AWS 연결 제외)
        run: ./gradlew test -Djunit.platform.exclude.tags='aws & external-api'

      - name: 테스트 결과 리포트 생성
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: build/test-results/test/*.xml

      - name: 테스트 커버리지 업로드
        uses: codecov/codecov-action@v4
        if: >
          github.event_name == 'push' ||
          github.event.pull_request.head.repo.full_name == github.repository
        with:
          token: ${{secrets.CODECOV_TOKEN}}
          files: build/reports/jacoco/test/jacocoTestReport.xml
          fail_ci_if_error: 'true'